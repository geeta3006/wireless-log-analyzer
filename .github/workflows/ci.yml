name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic logs
        run: python generate_logs.py --count 200 --output test_logs.jsonl

      - name: Run analyzer
        run: python analyzer.py --input test_logs.jsonl

      - name: Generate HTML report
        run: python report.py --input test_logs.jsonl --output test_report.html

      - name: Verify outputs exist
        run: |
          test -f test_logs.jsonl  && echo "✓ logs generated"
          test -f test_report.html && echo "✓ report generated"

      - name: Check error rate threshold
        run: |
          python3 - <<'EOF'
          import json
          logs = [json.loads(l) for l in open("test_logs.jsonl")]
          errors = sum(1 for l in logs if l["level"] == "ERROR")
          rate = errors / len(logs)
          print(f"Error rate: {rate:.1%} ({errors}/{len(logs)})")
          assert rate < 0.25, f"Error rate {rate:.1%} exceeds 25% threshold — check generator"
          print("✓ Error rate within acceptable range")
          EOF

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t wireless-log-analyzer:ci .

      - name: Verify image starts
        run: |
          docker run -d --name wla-test -p 8501:8501 wireless-log-analyzer:ci
          sleep 10
          docker logs wla-test
          docker stop wla-test
